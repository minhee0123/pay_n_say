name: pay_n_say
description: 가계부 관리와 영어 학습을 결합한 앱. 소비 내역을 기록하면서 금융/소비 관련 영어 표현을 자연스럽게 학습합니다.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.4.10
  go_router: ^13.1.0
  image_picker: ^1.0.7
  table_calendar: ^3.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
